name: Publish to npm

# Tag-triggered: push a `v*` tag (e.g. `v1.0.0`) and CI publishes that
# version to npm. Use `npm version patch|minor|major` locally — it bumps
# package.json, commits, and tags in one shot; then `git push --follow-tags`.
on:
  push:
    tags: ["v*"]

# `id-token: write` is required both for provenance and for npm Trusted
# Publishing (OIDC). `contents: read` is the default minimum for checkout.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # npm 11.5+ is required for Trusted Publishing (OIDC exchange
          # with the npm registry). Node 22 ships that version; Node 20
          # ships npm 10.x which doesn't support it.
          node-version: 22
          cache: pnpm
          # NOTE: no `registry-url` — setting it makes setup-node write an
          # .npmrc that authenticates with `${{ github.token }}` (useless
          # for npm) and npm CLI prefers that token over OIDC, causing a
          # 404. Trusted Publishing does its own registry-URL resolution.

      - name: Install
        run: pnpm install --frozen-lockfile

      # Same safety net as test.yml — don't publish broken code.
      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: npx tsc -p tsconfig.json

      - name: Unit tests
        run: pnpm test

      - name: Verify tag matches package version
        # Catches the mistake of pushing `v1.0.1` when package.json still
        # says 1.0.0 — npm would happily re-publish 1.0.0 and collide.
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Publish to npm
        # Trusted Publishing: no `NODE_AUTH_TOKEN`. npm CLI fetches the
        # GitHub OIDC token from `id-token: write` above and exchanges
        # it with the registry (the package must have a trusted
        # publisher configured at npmjs.com pointing at this repo +
        # workflow file). `prepack` rebuilds `dist/` before the
        # tarball; `--provenance` is implicit with OIDC but kept
        # explicit for clarity.
        run: npm publish --provenance
