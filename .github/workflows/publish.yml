name: Publish to npm

# Tag-triggered: push a `v*` tag (e.g. `v1.0.0`) and CI publishes that
# version to npm. Use `npm version patch|minor|major` locally — it bumps
# package.json, commits, and tags in one shot; then `git push --follow-tags`.
on:
  push:
    tags: ["v*"]

# `id-token: write` is required both for provenance and for npm Trusted
# Publishing (OIDC). `contents: read` is the default minimum for checkout.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          # NOTE: no `registry-url` — setting it makes setup-node write an
          # .npmrc that authenticates with `${{ github.token }}` (useless
          # for npm) and npm CLI prefers that token over OIDC, causing a
          # 404. Trusted Publishing does its own registry-URL resolution.

      - name: Install
        run: pnpm install --frozen-lockfile

      # Same safety net as test.yml — don't publish broken code.
      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: npx tsc -p tsconfig.json

      - name: Unit tests
        run: pnpm test

      - name: Verify tag matches package version and resolve dist-tag
        id: version
        # Two checks in one step:
        # 1. Tag must match package.json — catches the mistake of pushing
        #    `v1.0.1` when package.json still says 1.0.0 (npm would re-publish
        #    1.0.0 and collide).
        # 2. Route prereleases (`2.4.0-rc.1`, `3.0.0-beta.5`, etc.) to the
        #    `next` dist-tag instead of `latest`, so `pnpm add <pkg>` and
        #    consumers with caret ranges never surface an unstable version.
        #    Any version containing `-` is treated as a prerelease (semver).
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
          if [[ "$TAG" == *-* ]]; then
            echo "dist=next" >> "$GITHUB_OUTPUT"
          else
            echo "dist=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "Publishing $PKG to dist-tag: $(if [[ $TAG == *-* ]]; then echo next; else echo latest; fi)"

      - name: Publish to npm
        # `npx npm@latest` bypasses the hosted runner's preinstalled
        # npm (Node 22 LTS ships npm 10.x, which doesn't support
        # Trusted Publishing / OIDC — added in npm 11.5). We also hit a
        # broken preinstalled npm 10.x that `npm i -g npm@latest` can't
        # recover from ("Cannot find module 'promise-retry'"), so
        # fetching a fresh npm via npx is both the simplest upgrade
        # path and a workaround for the toolcache issue.
        #
        # No `NODE_AUTH_TOKEN`: npm fetches the GitHub OIDC token
        # (requires `id-token: write` above) and exchanges it with the
        # registry. The package must have a trusted publisher
        # configured on npmjs.com pointing at this repo + workflow.
        # `prepack` rebuilds `dist/` before the tarball.
        run: npx npm@latest publish --provenance --tag ${{ steps.version.outputs.dist }}
