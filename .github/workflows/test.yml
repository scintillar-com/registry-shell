name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs — no reason to finish testing a commit that's
# already been pushed over on the same branch.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint + type-check + build + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        # Root tsconfig covers src/ + next-app/ + playwright.config — broader
        # than the CLI's tsconfig.cli.json. `noEmit: true` is already set.
        run: npx tsc -p tsconfig.json

      - name: Build CLI
        run: pnpm build

      - name: Unit tests
        run: pnpm test
